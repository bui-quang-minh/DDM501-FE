services:
  backend:
    build:
      context: ./backend
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    ports:
      - "${BE_PORT}:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - qlcc-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    ports:
      - "${FE_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qlcc-net

volumes:
  backend_uploads:

networks:
  qlcc-net:
    driver: bridge
